name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2    
      
    - name: Restore NuGet packages
      run: nuget restore PasswordApp/PasswordApp.sln

    - name: Build
      run: msbuild PasswordApp/PasswordApp.sln /p:Configuration=Release /t:Rebuild
      
    - name: Run Tests (vstest for .NET Framework)
      run: |
        # Явно собираем проект тестов, чтобы убедиться в наличии DLL
        msbuild TestPassword/TestPassword/TestPassword.csproj /p:Configuration=Release /t:Rebuild
        
        # Путь к скомпилированной DLL с тестами
        $testDll = "TestPassword/TestPassword/bin/Release/TestPassword.dll"
        
        # Проверяем, существует ли файл
        if (Test-Path $testDll) {
            Write-Host "✅ Test assembly found: $testDll"
            # Запускаем тесты через встроенный раннер Visual Studio
            vstest.console.exe $testDll /Platform:x64 /Framework:Framework472 /Logger:console;verbosity=detailed
        } else {
            Write-Error "❌ Test assembly not found: $testDll"
            exit 1
        }  

    - name: Publish
      run: msbuild PasswordApp/PasswordApp.sln /p:Configuration=Release /p:DeployOnBuild=true /p:PublishDir=publish/

    - name: Upload Published Files
      uses: actions/upload-artifact@v4
      with:
        name: PasswordApp-Published
        path: PasswordApp/PasswordApp/bin/Release/
  