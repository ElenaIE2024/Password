name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2        

    - name: Build Solution (with restore)
      run: dotnet build PasswordApp/PasswordApp.sln --configuration Release --force
      
    - name: Run Tests
      run: dotnet test PasswordApp/PasswordApp.sln --configuration Release --verbosity normal

    - name: Publish
      if: success()
      run: msbuild PasswordApp/PasswordApp/PasswordApp.csproj /p:Configuration=Release /p:DeployOnBuild=true /p:PublishProfile=FolderProfile

    - name: Copy Published Files
      if: success()
      run: |
        # Копируем файлы из папки публикации, созданной msbuild
        $source = "PasswordApp/PasswordApp/bin/Release/net472/publish"
        $dest = "./publish"
        if (Test-Path $source) {
            Copy-Item -Path "$source/*" -Destination $dest -Recurse -Force
        } else {
            # Если папка publish не создана, копируем из bin/Release
            Copy-Item -Path "PasswordApp/PasswordApp/bin/Release/*" -Destination $dest -Recurse -Force -Exclude "*.pdb"
        }